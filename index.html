<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Bracket Pool</title>
<style>
  :root{
    --bg:#0a0a0c; --panel:#5be7e0; --panel-text:#06121a;
    --win:#26d07c; --win-text:#04140c; --empty:#1c1d22; --empty-line:#2b2d34;
    --pick:#f5b14c; --pick-text:#1a1203;
    --line:#3a6f6c; --text:#f2f4f5; --muted:#8c9196;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:var(--text);
    font-family:"Arial Narrow",Arial,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
}
  body::before{content:"";position:fixed;inset:0;background:rgba(0,0,0,.65);pointer-events:none;z-index:-1;}

  .topbar{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px 6px;flex-wrap:wrap;}
  .tab{background:var(--empty);color:var(--text);border:1px solid var(--empty-line);border-radius:999px;
    padding:9px 18px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:inherit;font-weight:700;}
  .tab.active{background:var(--panel);color:var(--panel-text);border-color:var(--panel);}
  .tab:hover:not(.active){background:#26282f;}

  .who{position:fixed;top:12px;left:14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);z-index:60;}
  .who b{color:var(--text);}
  .who a{color:var(--muted);text-decoration:underline;cursor:pointer;margin-left:8px;}
  .edit-trigger{position:fixed;top:12px;right:14px;opacity:.35;transition:opacity .2s;font-size:11px;
    letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-decoration:none;z-index:60;cursor:pointer;}
  .edit-trigger:hover{opacity:1;color:var(--text);}
  .edit-trigger.on{opacity:1;color:var(--win);}

  .view{display:none;}
  .view.active{display:block;}

  /* ---- banner / status line ---- */
  .banner{text-align:center;font-size:13px;color:var(--muted);padding:4px 16px 8px;min-height:18px;}
  .banner b{color:var(--text);}
  .banner.warn b{color:var(--pick);}

  /* ---- bracket ---- */
  .scroll{
    padding:6px 10px 24px;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
}
  .scaler{
    margin:0 auto;
    overflow:visible;
}
  .bracket{display:flex;align-items:stretch;justify-content:center;width:1804px;padding:0 8px;transform-origin:top left;}
  @media (max-width:760px){

    .scroll{
    overflow:auto;
    -webkit-overflow-scrolling:touch;
}

    .bracket{
        flex-direction:row;
        width:1804px;
        transform:none !important;
    }

    .round{
        min-width:185px;
    }

    .round.final{
        min-width:200px;
    }

    .match{
        margin:8px 8px;
    }

    .team{
        min-height:50px;
    }

    .name{
        font-size:14px;
    }

    .topbar{
        width:100%;
    }

    .tab{
        flex:1;
    }
}
  .round{display:flex;flex-direction:column;justify-content:space-around;flex:1;min-width:185px;}
  .round.final{justify-content:center;min-width:200px;}
  .match{display:flex;flex-direction:column;gap:6px;margin:8px 8px;position:relative;}
  .team{display:flex;align-items:center;gap:9px;background:var(--panel);color:var(--panel-text);
    border:none;border-radius:22px;padding:9px 13px;min-height:44px;width:100%;text-align:left;
    font-family:inherit;transition:background .15s,opacity .15s,transform .15s;
    box-shadow:0 0 0 1px rgba(255,255,255,.06),0 0 22px rgba(91,231,224,.10);}
  .team.clickable{cursor:pointer;}
  .team.empty{background:var(--empty);color:var(--muted);cursor:default;}
  .team.winner{background:var(--win);color:var(--win-text);font-weight:700;}      /* official winner */
  .team.picked{background:var(--pick);color:var(--pick-text);font-weight:700;}     /* user's prediction */
  .team.locked{cursor:default;opacity:.92;}
  .team.dim{opacity:.4;}
  .team.clickable:not(.empty):hover{filter:brightness(.97);transform:translateY(-1px);}
  .flag{width:30px;height:20px;border-radius:3px;flex:0 0 auto;overflow:hidden;display:block;box-shadow:0 0 0 1px rgba(0,0,0,.15);}
  .flag svg{width:100%;height:100%;display:block;}
  .name{flex:1;font-weight:700;font-size:13px;letter-spacing:.3px;text-transform:uppercase;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tag{flex:0 0 auto;font-size:9px;font-weight:800;letter-spacing:.5px;border-radius:6px;padding:2px 5px;
    background:rgba(0,0,0,.22);text-transform:uppercase;}
  .tag.ok{background:var(--win);color:var(--win-text);}
  .tag.no{background:#d0473a;color:#fff;}

  /* ---- login / submit panel ---- */
  .panel{max-width:440px;margin:18px auto;background:#121319;border:1px solid #24262e;border-radius:16px;padding:24px;}
  .panel h2{margin:0 0 6px;font-size:18px;letter-spacing:.5px;text-transform:uppercase;}
  .panel p{margin:0 0 16px;color:var(--muted);font-size:13px;line-height:1.5;}
  .panel label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:12px 0 5px;}
  .panel input{width:100%;background:#0a0a0c;border:1px solid #2b2d34;color:var(--text);border-radius:10px;
    padding:11px 12px;font-size:15px;font-family:inherit;}
  .panel button{width:100%;margin-top:18px;border:none;border-radius:10px;padding:13px;font-size:13px;
    letter-spacing:1px;text-transform:uppercase;font-weight:800;cursor:pointer;font-family:inherit;
    background:var(--panel);color:var(--panel-text);}
  .panel button.ghost{background:#23252d;color:var(--text);margin-top:10px;}
  .panel .err{color:#ff8174;font-size:12px;margin-top:10px;min-height:14px;}

  .submit-bar{position:sticky;bottom:0;background:linear-gradient(to top,rgba(10,10,12,.96),rgba(10,10,12,.0));
    padding:16px;display:flex;justify-content:center;gap:12px;z-index:30;}
  .submit-bar button{border:none;border-radius:12px;padding:14px 26px;font-size:13px;letter-spacing:1px;
    text-transform:uppercase;font-weight:800;cursor:pointer;font-family:inherit;background:var(--pick);color:var(--pick-text);}
  .submit-bar .count{align-self:center;color:var(--muted);font-size:12px;}

  /* ---- leaderboard ---- */
  .board{max-width:560px;margin:14px auto;padding:0 14px;}
  .board .row{display:flex;align-items:center;gap:12px;background:#121319;border:1px solid #24262e;
    border-radius:12px;padding:13px 16px;margin-bottom:8px;}
  .board .row.me{border-color:var(--pick);}
  .board .rank{font-size:16px;font-weight:800;color:var(--muted);min-width:28px;text-align:center;}
  .board .rank.top{color:var(--pick);}
  .board .pname{flex:1;font-weight:700;font-size:15px;letter-spacing:.3px;}
  .board .pname .youtag{font-size:10px;color:var(--pick);letter-spacing:1px;margin-left:6px;}
  .board .pts{font-size:18px;font-weight:800;color:var(--win);}
  .board .empty-note{text-align:center;color:var(--muted);font-size:13px;padding:30px;}
  .board h2{text-align:center;font-size:16px;letter-spacing:1px;text-transform:uppercase;margin:6px 0 14px;}

  /* ---- modal (admin password) ---- */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:80;}
  .backdrop.open{display:flex;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1b1d24;border:1px solid #33363f;
    color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;z-index:90;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
  <div class="who" id="who"></div>
  <span class="edit-trigger" id="editTrigger" title="Admin">Admin</span>

  <div class="topbar" id="topbar">
    <button class="tab active" data-view="bracket">Bracket</button>
    <button class="tab" data-view="predict">My Picks</button>
    <button class="tab" data-view="leaderboard">Leaderboard</button>
  </div>

  <div class="banner" id="banner"></div>

  <!-- BRACKET (official results, read-only to public; clickable in admin) -->
  <div class="view active" id="view-bracket">
    <div class="scroll"><div class="scaler" id="scaler-b"><div class="bracket" id="bracket-b"></div></div></div>
  </div>

  <!-- PREDICT -->
  <div class="view" id="view-predict">
    <div id="predict-login"></div>
    <div id="predict-body"></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="view" id="view-leaderboard">
    <div class="board" id="board"></div>
  </div>

  <div class="backdrop" id="pwBackdrop">
    <div class="panel" style="margin:0;">
      <h2>Admin</h2>
      <p>Enter the admin password to record official match results.</p>
      <label>Password</label>
      <input type="password" id="pwInput" autocomplete="off">
      <div class="err" id="pwErr"></div>
      <button id="pwGo">Unlock</button>
      <button class="ghost" id="pwCancel">Cancel</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ---- CONFIG ----
var SUPABASE_URL = "https://resbugkvkcwgoxmiagli.supabase.co";
var SUPABASE_KEY = "sb_publishable_XY4X73yZPehx-SLFyWmtWg_FBzasxo_";
var ADMIN_PASSWORD = "raabi2026";   // change this to your own
var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---- TEAMS (Round of 32 seeding from the bracket image) ----
var R32 = [
  ["Germany","de"],["Paraguay","py"],["France","fr"],["Sweden","se"],
  ["South Africa","za"],["Canada","ca"],["Netherlands","nl"],["Morocco","ma"],
  ["Portugal","pt"],["Croatia","hr"],["Spain","es"],["Austria","at"],
  ["United States","us"],["Bosnia-Herzegovina","ba"],["Belgium","be"],["Senegal","sn"],
  ["Brazil","br"],["Japan","jp"],["Ivory Coast","ci"],["Norway","no"],

].map(function(t,i){return {name:t[0],code:t[1],id:"r32_"+i};});
function findTeam(n){for(var i=0;i<R32.length;i++) if(R32[i].name===n) return R32[i]; return null;}

// ---- BRACKET TREE BUILDER ----
// Builds a structure of matches. Reused for BOTH the official bracket and
// each user's prediction bracket — same shape, different "winner" data.
function buildTree(){
  var MID=0;
  function mk(side){return {id:"m"+(MID++),a:null,b:null,winner:null,side:side,advancesTo:null,round:0};}
  function half(teams,side){
    var rounds=[], prev=[];
    for(var i=0;i<teams.length;i+=2){var m=mk(side);m.a=teams[i];m.b=teams[i+1];m.round=0;prev.push(m);}
    rounds.push(prev);
    while(prev.length>1){
      var next=[];
      for(var j=0;j<prev.length;j+=2){
        var m=mk(side);m.round=rounds.length;
        prev[j].advancesTo=[m,0]; prev[j+1].advancesTo=[m,1];
        next.push(m);
      }
      rounds.push(next); prev=next;
    }
    return rounds;
  }
  var LEFT=R32.slice(0,16), RIGHT=R32.slice(16,32);
  var leftRounds=half(LEFT,"left"), rightRounds=half(RIGHT,"right");
  var FINAL=mk("final"); FINAL.round=4;
  leftRounds[leftRounds.length-1][0].advancesTo=[FINAL,0];
  rightRounds[rightRounds.length-1][0].advancesTo=[FINAL,1];
  var ALL=[]; leftRounds.forEach(function(r){r.forEach(function(m){ALL.push(m);});});
  ALL.push(FINAL); rightRounds.forEach(function(r){r.forEach(function(m){ALL.push(m);});});
  var byId={}; ALL.forEach(function(m){byId[m.id]=m;});
  return {leftRounds:leftRounds, rightRounds:rightRounds, FINAL:FINAL, ALL:ALL, byId:byId};
}

// Set the winner of a match within a tree and propagate the team forward.
// If changing an existing winner, clear everything downstream first.
function setWin(tree, m, side){
  var w = side==="a"?m.a:m.b;
  if(!w) return;
  if(m.winner && m.winner!==side) clearDown(m);
  m.winner=side;
  if(m.advancesTo){
    var next=m.advancesTo[0], slot=m.advancesTo[1];
    var cur=slot===0?next.a:next.b;
    if(cur && cur!==w){ next.winner=null; clearDown(next); }
    if(slot===0) next.a=w; else next.b=w;
  }
}
function clearDown(m){
  if(!m.advancesTo) return;
  var next=m.advancesTo[0], slot=m.advancesTo[1];
  if(slot===0) next.a=null; else next.b=null;
  next.winner=null;
  clearDown(next);
}

// Serialize a tree's results to a compact object: { matchId: winningTeamName }
function treeToData(tree){
  var out={};
  tree.ALL.forEach(function(m){ if(m.winner){ out[m.id]= (m.winner==="a"?m.a:m.b).name; } });
  return out;
}
// Apply a saved data object back onto a fresh tree (replays winners in round order).
function dataToTree(data){
  var tree=buildTree();
  // replay by round so feeder teams exist before later rounds
  var byRound=tree.ALL.slice().sort(function(x,y){return x.round-y.round;});
  byRound.forEach(function(m){
    var wn=data[m.id]; if(!wn) return;
    var side = (m.a && m.a.name===wn) ? "a" : (m.b && m.b.name===wn) ? "b" : null;
    if(side) setWin(tree,m,side);
  });
  return tree;
}

// ============================================================
//  EMBEDDED FLAGS  (defined in the other <script> as window.FLAGS)
// ============================================================
var FLAGS = window.FLAGS;
function flagBox(code){ return '<span class="flag">'+(FLAGS[code]||"")+'</span>'; }

// ============================================================
//  GLOBAL STATE
// ============================================================
var official = buildTree();   // official results tree
var officialData = {};        // raw {matchId:teamName} from DB
var me = null;                // {name,email} once "logged in"
var mySubmission = null;      // my saved prediction row (if any)
var adminMode = false;
var currentView = "bracket";

// The 4 pre-seeded results (used only if the DB has no official bracket yet)
var SEED = {};
(function(){
  var t=buildTree();
  function win(mid, teamName){
    var m=t.byId[mid];
    var side=(m.a&&m.a.name===teamName)?"a":(m.b&&m.b.name===teamName)?"b":null;
    if(side) setWin(t,m,side);
  }
  // m0=Germany/Paraguay, m1=France/Sweden, m2=SouthAfrica/Canada, m3=Netherlands/Morocco
  // (left half order). Right half: m9=Brazil/Japan ... but let's locate by teams.
  // Easier: find the R32 match containing both teams.
  function r32MatchOf(name){
    for(var i=0;i<t.ALL.length;i++){var m=t.ALL[i];
      if(m.round===0 && ((m.a&&m.a.name===name)||(m.b&&m.b.name===name))) return m;}
    return null;
  }
  function seedWinner(winnerName){
    var m=r32MatchOf(winnerName); if(!m) return;
    var side=(m.a&&m.a.name===winnerName)?"a":"b"; setWin(t,m,side);
  }
  seedWinner("Paraguay");
  seedWinner("Canada");
  seedWinner("Morocco");
  seedWinner("Brazil");
  SEED = treeToData(t);
})();

// ============================================================
//  RENDER: a bracket (shared by official + predictions)
// ============================================================
// opts: { mode:"official"|"predict"|"readonly", tree, container, scaler,
//         onPick:fn, official:officialTreeForComparison }
function renderBracket(opts){
  var tree=opts.tree, mode=opts.mode;
  var container=document.getElementById(opts.container);
  container.innerHTML="";

  function teamEl(m, slot){
    var team = slot==="a"?m.a:m.b;
    if(!team) return '<div class="team empty"><span class="flag"></span><span class="name">TBD</span></div>';
    var classes=["team"];
    var tags="";

    if(mode==="official"){
      if(m.winner===slot) classes.push("winner");
      else if(m.winner) classes.push("dim");
      if(adminMode) classes.push("clickable");
    }
    else if(mode==="predict"){
      // is this match already decided officially? -> locked, show official result
      var off = officialMatch(m.id);
      var decided = off && off.winner;
      if(decided){
        classes.push("locked");
        var offWinSlot = officialWinnerSlotForTeam(m.id, team);
        if(offWinSlot) classes.push("winner"); else classes.push("dim");
      } else {
        // open for picking
        if(m.winner===slot) classes.push("picked");
        else if(m.winner) classes.push("dim");
        classes.push("clickable");
      }
    }
    else if(mode==="readonly"){
      var userPicks = opts.userPicks || {};
      var off2=officialMatch(m.id);
      var offName = (off2 && off2.winner) ? (off2.winner==="a"?off2.a:off2.b).name : null;
      var userPickedHere = userPicks.hasOwnProperty(m.id); // did the user predict THIS match
      if(userPickedHere){
        // this slot shows the user's predicted winner
        if(m.winner===slot){
          if(offName){
            if(offName===team.name){ classes.push("winner"); tags='<span class="tag ok">✓</span>'; }
            else { classes.push("picked"); tags='<span class="tag no">✗</span>'; }
          } else {
            classes.push("picked"); // predicted, not yet decided
          }
        } else if(m.winner){ classes.push("dim"); }
      } else {
        // official-only match (locked / not the user's pick): show official result plainly
        if(m.winner===slot) classes.push("winner");
        else if(m.winner) classes.push("dim");
      }
    }

    return '<div class="'+classes.join(" ")+'" data-mid="'+m.id+'" data-slot="'+slot+'">'
      + flagBox(team.code)
      + '<span class="name">'+team.name+'</span>'
      + tags
      + '</div>';
  }

  function matchEl(m){
    return '<div class="match">'+teamEl(m,"a")+teamEl(m,"b")+'</div>';
  }
  function col(matches){
    var c=document.createElement("div"); c.className="round";
    matches.forEach(function(m){c.insertAdjacentHTML("beforeend",matchEl(m));});
    return c;
  }

  tree.leftRounds.forEach(function(r){container.appendChild(col(r));});
  var fc=document.createElement("div"); fc.className="round final";
  fc.insertAdjacentHTML("beforeend",matchEl(tree.FINAL)); container.appendChild(fc);
  tree.rightRounds.slice().reverse().forEach(function(r){container.appendChild(col(r));});

  // wire clicks
  if(mode==="official" && adminMode){
    container.querySelectorAll(".team.clickable").forEach(function(el){
      el.onclick=function(){ opts.onPick(el.getAttribute("data-mid"), el.getAttribute("data-slot")); };
    });
  }
  if(mode==="predict"){
    container.querySelectorAll(".team.clickable").forEach(function(el){
      el.onclick=function(){ opts.onPick(el.getAttribute("data-mid"), el.getAttribute("data-slot")); };
    });
  }

  if(opts.scaler) fitBracket(opts.container, opts.scaler);
}

// helpers to look at the official tree from inside predict/readonly rendering
function officialMatch(mid){ return official.byId[mid]; }
function officialWinnerSlotForTeam(mid, team){
  var off=official.byId[mid];
  if(!off || !off.winner) return false;
  var offTeam = off.winner==="a"?off.a:off.b;
  return offTeam && offTeam.name===team.name;
}

// ---- fit-to-width scaler ----
function fitBracket(containerId, scalerId){
  var bracket=document.getElementById(containerId);
  var scaler=document.getElementById(scalerId);
  var scroll=scaler.parentElement;
  if(window.innerWidth<=760){

    bracket.style.transform = "none";

    scaler.style.width = bracket.scrollWidth + "px";
    scaler.style.height = bracket.scrollHeight + "px";

    scroll.style.overflow = "auto";

    return;
}
  bracket.style.transform="none"; scaler.style.width=""; scaler.style.height="";
  var bb=bracket.getBoundingClientRect();
  var minL=bb.left,maxR=bb.right,minT=bb.top,maxB=bb.bottom;
  bracket.querySelectorAll(".team").forEach(function(t){
    var r=t.getBoundingClientRect();
    if(r.left<minL)minL=r.left; if(r.right>maxR)maxR=r.right;
    if(r.top<minT)minT=r.top; if(r.bottom>maxB)maxB=r.bottom;
  });
  var nW=(maxR-minL)+4, nH=(maxB-minT)+4;
  var availW=scroll.clientWidth-16;
  var availH=Math.max(220, window.innerHeight-160);
  var scale=Math.min(1, availW/nW, availH/nH);
  bracket.style.transform="scale("+scale+")";
  scaler.style.width=(nW*scale)+"px";
  scaler.style.height=(nH*scale)+"px";
}
window.addEventListener("resize", function(){
  if(currentView==="bracket") fitBracket("bracket-b","scaler-b");
  if(currentView==="predict" && document.getElementById("bracket-p")) fitBracket("bracket-p","scaler-p");
});

function loadOfficial(){
  return db.from("bracket_state").select("data").eq("id","official").maybeSingle()
    .then(function(res){
      if(res.error){ console.warn(res.error); return; }
      if(res.data && res.data.data){
        officialData = res.data.data;
        official = dataToTree(officialData);
      } else {
        // seed the 4 starting results on first ever load
        officialData = JSON.parse(JSON.stringify(SEED));
        official = dataToTree(officialData);
        return saveOfficial(); // write the seed up
      }
    });
}
function saveOfficial(){
  officialData = treeToData(official);
  return db.from("bracket_state")
    .upsert({id:"official", data:officialData, updated_at:new Date().toISOString()})
    .then(function(res){ if(res.error) console.warn("saveOfficial",res.error); });
}
function loadAllPredictions(){
  return db.from("predictions").select("name,email,picks,submitted_at")
    .then(function(res){ if(res.error){console.warn(res.error);return [];} return res.data||[]; });
}
function loadMyPrediction(email){
  return db.from("predictions").select("name,email,picks,submitted_at").eq("email", email.toLowerCase()).maybeSingle()
    .then(function(res){ if(res.error){console.warn(res.error);return null;} return res.data||null; });
}
function submitPrediction(row){

}

// ============================================================
//  SCORING
//  1 point per match where the user's predicted winner == official winner.
//  Only counts matches that have an official winner.
// ============================================================
function scoreOne(picks){
  var s=0;
  for(var mid in officialData){
    if(picks[mid] && picks[mid]===officialData[mid]) s++;
  }
  return s;
}

  if(v!=="bracket"){ tb.textContent=""; tb.className="banner"; }

}

var predictTree=null;
function renderPredictView(){

      + '<h2>Join the pool</h2>'

      + '<div class="err" id="loginErr"></div>'
      + '<button id="loginGo">Continue</button>'
      + '</div>';
    document.getElementById("loginGo").onclick=function(){
      var n=document.getElementById("inName").value.trim();

      if(!n || !e || e.indexOf("@")<0){ err.textContent="Please enter a name and a valid email."; return; }

      try{localStorage.setItem("wc_me", JSON.stringify(me));}catch(_){}
      updateWho();
      // check if they already submitted
      loadMyPrediction(e).then(function(row){
        mySubmission=row;

    };

  }

  // logged in
  if(mySubmission){

    bodyEl.innerHTML =
      '<div class="banner"><b>'+esc(me.name)+'</b>, your picks are locked in. Green check = correct so far, red = wrong. Decided matches you didn\'t pick are shown from the official results.</div>'
      + '<div class="scroll"><div class="scaler" id="scaler-p"><div class="bracket" id="bracket-p"></div></div></div>';
    // merge: official decided results + the user's own picks (picks win where both exist)
    var merged={};
    for(var k in officialData) merged[k]=officialData[k];

    var t=dataToTree(merged);
    renderBracket({ mode:"readonly", tree:t, container:"bracket-p", scaler:"scaler-p", userPicks:mySubmission.picks });

  // active prediction form
  if(!predictTree) predictTree = freshPredictTree();

    '<div class="banner warn">Pick a winner for every open match. Greyed matches are <b>already decided</b> and are locked.</div>'
    + '<div class="scroll"><div class="scaler" id="scaler-p"><div class="bracket" id="bracket-p"></div></div></div>'
    + '<div class="submit-bar"><span class="count" id="pcount"></span>'
    + '<button id="submitBtn">Submit my bracket</button></div>';

  renderBracket({
    mode:"predict", tree:predictTree, container:"bracket-p", scaler:"scaler-p",
    onPick:function(mid,slot){
      var m=predictTree.byId[mid];
      if(m.winner===slot){ m.winner=null; clearDown(m); }
      else setWin(predictTree, m, slot);
      renderPredictView2();  // re-render just the bracket + count
    }
  });
  updateCount();
  document.getElementById("submitBtn").onclick=doSubmit;
}

// lighter re-render of the predict bracket (keeps form, avoids rebuilding login)
function renderPredictView2(){
  renderBracket({
    mode:"predict", tree:predictTree, container:"bracket-p", scaler:"scaler-p",
    onPick:function(mid,slot){
      var m=predictTree.byId[mid];
      if(m.winner===slot){ m.winner=null; clearDown(m); }
      else setWin(predictTree, m, slot);
      renderPredictView2();
    }
  });
  updateCount();
}

// A fresh tree for predicting: copy the official decided matches in as fixed,
// so the user's downstream picks flow from real teams.
function freshPredictTree(){
  var t=dataToTree(officialData);  // start with official decided results in place
  return t;
}

// how many open matches still need a pick
function openMatchesNeeding(tree){
  var need = tree.ALL.length - Object.keys(officialData).length;
  var made = 0;

  tree.ALL.forEach(function(m){
    var off = official.byId[m.id];
    var decided = off && off.winner;
    if(decided) return;      // don't count matches already decided officially
    if(m.winner) made++;     // user has picked a winner for this match
  });

  return {need:need, made:made};
}
function updateCount(){
  var c=openMatchesNeeding(predictTree);
  var el=document.getElementById("pcount");
  if(el) el.textContent = c.made+" of "+c.need+" open matches picked";
}

function doSubmit(){
  var c=openMatchesNeeding(predictTree);
  if(c.made<c.need){
    if(!confirm("You've picked "+c.made+" of "+c.need+" open matches. Submit anyway? Unpicked matches score 0 and you can't change them later.")) return;
  } else {
    if(!confirm("Submit your bracket? This is final — you can't change it afterward.")) return;
  }
  // serialize ONLY the user's genuine predictions: drop any match that was
  // already officially decided at submission time (those are locked, not theirs).
  var full=treeToData(predictTree);
  var picks={};
  for(var mid in full){
    var off=official.byId[mid];
    if(off && off.winner) continue;   // already decided officially -> not the user's pick
    picks[mid]=full[mid];
  }
  var row={ name:me.name, email:me.email.toLowerCase(), picks:picks, submitted_at:new Date().toISOString() };
  document.getElementById("submitBtn").disabled=true;
  submitPrediction(row).then(function(res){
    if(res.error){
      if((res.error.message||"").toLowerCase().indexOf("duplicate")>=0 || res.error.code==="23505"){
        alert("This email has already submitted a bracket.");
        loadMyPrediction(me.email).then(function(r){ mySubmission=r; renderPredictView(); });
      } else {
        alert("Could not submit: "+(res.error.message||"unknown error"));
        document.getElementById("submitBtn").disabled=false;
      }
      return;
    }
    mySubmission=row;
    showToast("Bracket submitted!");
    renderPredictView();
    renderLeaderboard();
  });
}

// ---- LEADERBOARD ----
function renderLeaderboard(){
  var board=document.getElementById("board");
  board.innerHTML='<h2>Leaderboard</h2><div class="empty-note">Loading…</div>';
  loadAllPredictions().then(function(rows){
    if(!rows.length){ board.innerHTML='<h2>Leaderboard</h2><div class="empty-note">No predictions submitted yet.</div>'; return; }
    var scored=rows.map(function(r){ return {name:r.name, email:(r.email||"").toLowerCase(), pts:scoreOne(r.picks||{})}; });
    scored.sort(function(x,y){ return y.pts-x.pts || x.name.localeCompare(y.name); });
    var html='<h2>Leaderboard</h2>';
    var rank=0, lastPts=null, shown=0;
    scored.forEach(function(p){
      shown++;
      if(p.pts!==lastPts){ rank=shown; lastPts=p.pts; }
      var isMe = me && p.email===me.email.toLowerCase();
      html+='<div class="row'+(isMe?" me":"")+'">'
        + '<div class="rank'+(rank<=3?" top":"")+'">'+rank+'</div>'
        + '<div class="pname">'+esc(p.name)+(isMe?'<span class="youtag">YOU</span>':'')+'</div>'
        + '<div class="pts">'+p.pts+'</div>'
        + '</div>';
    });
    board.innerHTML=html;
  });
}

// ============================================================
//  ADMIN
// ============================================================
function setAdmin(on){
  adminMode=on;
  document.getElementById("editTrigger").classList.toggle("on", on);
  document.getElementById("editTrigger").textContent = on ? "Admin: ON" : "Admin";
  if(currentView==="bracket") renderOfficialView();
  setBanner();
}
function openPw(){
  document.getElementById("pwBackdrop").classList.add("open");
  document.getElementById("pwErr").textContent="";
  document.getElementById("pwInput").value="";
  document.getElementById("pwInput").focus();
}
function closePw(){ document.getElementById("pwBackdrop").classList.remove("open"); }

// ============================================================
//  BANNER + small UI
// ============================================================
function setBanner(){
  var b=document.getElementById("banner");
  if(currentView!=="bracket"){ b.textContent=""; b.className="banner"; return; }
  var done=Object.keys(officialData).length;
  if(adminMode){ b.className="banner warn"; b.innerHTML='<b>Admin mode</b> — click a team to set the official winner. Click again to undo.'; }
  else { b.className="banner"; b.innerHTML='Official results. <b>'+done+'</b> match'+(done===1?"":"es")+' decided so far.'; }
}
function updateWho(){
  var w=document.getElementById("who");
  if(me) w.innerHTML='Signed in as <b>'+esc(me.name)+'</b><a id="signout">sign out</a>';
  else w.innerHTML="";
  var so=document.getElementById("signout");
  if(so) so.onclick=function(){ me=null; mySubmission=null; predictTree=null; try{localStorage.removeItem("wc_me");}catch(_){}
    updateWho(); if(currentView==="predict") renderPredictView(); renderLeaderboard(); };
}
function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
var toastT=null;
function showToast(msg){
  var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove("show");},1800);
}

// ============================================================
//  WIRING
// ============================================================
document.querySelectorAll(".tab").forEach(function(t){
  t.onclick=function(){ switchView(t.getAttribute("data-view")); };
});
document.getElementById("editTrigger").onclick=function(){
  if(adminMode){ setAdmin(false); return; }
  openPw();
};
document.getElementById("pwGo").onclick=function(){
  if(document.getElementById("pwInput").value===ADMIN_PASSWORD){ closePw(); setAdmin(true); switchView("bracket"); }
  else document.getElementById("pwErr").textContent="Wrong password.";
};
document.getElementById("pwInput").addEventListener("keydown",function(e){ if(e.key==="Enter") document.getElementById("pwGo").click(); });
document.getElementById("pwCancel").onclick=closePw;
document.getElementById("pwBackdrop").onclick=function(e){ if(e.target===this) closePw(); };
document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&e.altKey&&e.key.toLowerCase()==="e"){ e.preventDefault(); if(adminMode) setAdmin(false); else openPw(); }
});

// restore "me" from last time
try{ var sm=localStorage.getItem("wc_me"); if(sm){ me=JSON.parse(sm); } }catch(_){}

// ============================================================
//  BOOT
// ============================================================
updateWho();
loadOfficial().then(function(){
  if(me){ return loadMyPrediction(me.email).then(function(r){ mySubmission=r; }); }
}).then(function(){
  switchView("bracket");
});

</script>
